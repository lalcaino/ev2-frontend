# .github/workflows/deploy-frontend.yml

name: CI/CD Frontend

on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ev2-frontend

jobs:

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: file
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy en EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ env.IMAGE_NAME }}:latest

            docker stop ev2-frontend || true
            docker rm ev2-frontend || true

            docker run -d \
              --name ev2-frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ env.IMAGE_NAME }}:latest

            docker ps | grep ev2-frontend

            docker image prune -f